# Operator-curated topic taxonomy for the deterministic tagger.
#
# Each `[topics.<label>]` entry has:
#   description : prose blob the embedder turns into a vector at startup
#                 (richer than the label alone — concrete examples + synonyms
#                 give bge-m3 enough surface to match semantically related
#                 thoughts).
#   threshold   : optional per-label cosine threshold override. If omitted,
#                 the tagger uses `topic_threshold_default` (0.60 by default).
#                 Lower it for broad categories that should match liberally;
#                 raise it for narrow technical terms where false-positives
#                 are worse than false-negatives.
#
# Labels use kebab-case to match the existing kengram corpus convention
# (see DESIGN.md §10 + `topics` field semantics).
#
# This file is seed-only — operators are expected to grow it against their
# own corpus. Re-tagging with a changed taxonomy is idempotent at the row
# level (capture writes new pending_tags; worker re-extracts).

[topics.memory-systems]
description = "agent memory, persistent context, vector store, embedding-based retrieval, conversational state across sessions"

[topics.information-retrieval]
description = "search relevance, ranking, semantic search, hybrid retrieval, fusion of lexical and vector scores, reranking"

[topics.embeddings]
description = "dense vector representations, sentence embeddings, model dimensions, cosine similarity, bge-m3, text-embeddings-inference"

[topics.databases]
description = "postgres, sqlx, schema migrations, indexes, query planning, jsonb, transactions, connection pooling"

[topics.pgvector]
description = "pgvector extension, HNSW index, IVFFlat, vector similarity search inside postgres, ANN tuning"


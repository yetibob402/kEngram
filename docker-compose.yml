# Dev-only Postgres + TEI reranker (+ optional deterministic tagger sidecar)
# for Engram. Production deployment uses systemd-managed services (see
# DESIGN.md §11), not this file.
#
# The pgvector/pgvector:pg16 image bundles the `vector`, `pg_trgm`, and
# `pgcrypto` extensions — i.e. everything the M1 migration's CREATE EXTENSION
# lines need. The image is the official one published by the pgvector
# maintainers.
#
# The TEI service serves BGE-reranker-v2-m3 as a cross-encoder reranker over
# HTTP. Added M3 Phase B step 2. Embeddings stay on Ollama in dev — TEI runs
# rerank-task only.
#
# Defaults are dev-friendly (engram/engram on localhost:5432). The container
# only accepts connections from localhost; a real password is unnecessary
# at this trust boundary.

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: engram-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: engram
      POSTGRES_PASSWORD: engram
      POSTGRES_DB: engram
    ports:
      - "5432:5432"
    volumes:
      - engram-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U engram -d engram"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  tei:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-arm64-latest
    container_name: engram-tei
    restart: unless-stopped
    environment:
      # TEI honors $HF_HOME for the model cache.
      HF_HOME: /data
    ports:
      - "8080:80"
    volumes:
      - engram-tei-models:/data
    command:
      - --model-id=cross-encoder/ms-marco-MiniLM-L-6-v2
      # MiniLM-L-6-v2 is the small (~22M params) dev reranker — ONNX
      # exports on HF (TEI takes the fast ORT path), sub-second warmup,
      # sub-100ms per-call latency on Apple Silicon CPU. BGE-reranker-v2-m3
      # was the first choice (Phase B step 2 plan); on Apple Silicon CPU
      # the 568M model with no ONNX export warms up via candle/safetensors,
      # which can take 5+ minutes and makes every per-call rerank slow.
      # Production deployments override via [reranker].model_id to a
      # larger model on a GPU host. Quality difference between MiniLM and
      # BGE-v2-m3 is measurable on retrieval benchmarks but isn't a Mac-dev
      # blocker; Phase B step 3's A/B harness can compare both.
      #
      # We use TEI's default max-client-batch-size of 32. TEI warms up the
      # model for each power-of-2 batch size up to this limit on first
      # boot; on Apple Silicon CPU each warmup step takes seconds, so
      # bumping the cap to 128 (an early Phase B step 2 attempt) made
      # warmup hang for many minutes. The matching `DEFAULT_RERANK_
      # CANDIDATE_POOL` in engram-mcp/src/search.rs is 32; per-call
      # callers can override via the `candidate_pool` request field if
      # they need a larger pool for quality measurement.
    healthcheck:
      # TEI's /health endpoint returns 200 once the model is loaded and
      # the warmup pass completes. First boot downloads ~600 MB; even on a
      # warm `tei-models` volume the warmup pass on Apple Silicon takes
      # 60-90s. 120s gives headroom for recreate cycles.
      test: ["CMD", "curl", "-fsS", "http://localhost/health"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 120s

  # Reference HTTP-sidecar tagger (engram-tagger-deterministic). Opt-in via
  # the `tagger` compose profile: `docker compose --profile tagger up -d`.
  # Default `docker compose up -d` does NOT start this service so dev
  # environments without the GLiNER model don't crashloop on startup.
  #
  # Prerequisites BEFORE first `docker compose --profile tagger up`:
  # 1. Download the GLiNER ONNX model to ~/models/gliner_small-v2.1/
  #    (see crates/engram-tagger-deterministic/README.md for curl invocations).
  # 2. Ensure an embedder is reachable. The default points at Ollama on the
  #    host via host.docker.internal:11434 — start Ollama and `ollama pull
  #    bge-m3` first.
  #
  # First build is slow (~5-10 min on Apple Silicon) — cargo compiles
  # gline-rs + ort native deps. Subsequent builds are fast (cached layers).
  tagger-deterministic:
    profiles: ["tagger"]
    build:
      context: .
      dockerfile: crates/engram-tagger-deterministic/Dockerfile
    container_name: engram-tagger-deterministic
    restart: unless-stopped
    environment:
      # Reach the host's Ollama for bge-m3 embeddings. Operators with a
      # different embedder setup (TEI configured for embedding, hosted
      # service, etc.) override this var.
      EMBEDDER_ENDPOINT: http://host.docker.internal:11434/v1
      EMBEDDER_MODEL: bge-m3
      GLINER_MODEL_DIR: /models/gliner
      TOPIC_TAXONOMY_PATH: /etc/engram/topic-taxonomy.toml
      KIND_THRESHOLD: "0.55"
      TOPIC_THRESHOLD: "0.45"
      MODEL_ID: deterministic/gliner-small-v2.1+regex+bge-m3
      MODEL_VERSION: "1"
      RUST_LOG: info
    extra_hosts:
      # macOS Docker Desktop maps this automatically; Linux needs the
      # explicit declaration so host.docker.internal resolves to the
      # gateway. Harmless on macOS.
      - "host.docker.internal:host-gateway"
    ports:
      # Host:container port 8082 (not 8081) so we don't collide with the
      # documented Tier 1 `engram serve` bind on 0.0.0.0:8081. Operators
      # running engram on a different port can remap freely.
      - "8082:8082"
    volumes:
      # GLiNER ONNX assets — operator-supplied (see README).
      - ${HOME}/models/gliner_small-v2.1:/models/gliner:ro
      # Topic taxonomy from the repo. Editing topic-taxonomy.toml on the
      # host requires restarting this service for the new vectors to take
      # effect (taxonomy is embedded once at startup).
      - ./crates/engram-tagger-deterministic/topic-taxonomy.toml:/etc/engram/topic-taxonomy.toml:ro
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8082/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      # Startup loads the ~580MB ONNX model + embeds taxonomy + 6 kind
      # prototypes against the embedder. 3s on dev hardware; 30s is
      # generous headroom.
      start_period: 30s

volumes:
  engram-pg-data:
  engram-tei-models:

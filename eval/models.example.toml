# Example model-arms file for `kengram eval tagger`.
#
# Copy to eval/models.toml (gitignored) and edit. Each [[arm]] is one tagger
# under test. `api_key_env` names an ENVIRONMENT VARIABLE holding the bearer
# token — never put a key in this file.
#
# Providers:
#   "openai-compatible" — any /v1/chat/completions backend with strict
#                         json_schema support (Ollama, vLLM, OpenRouter).
#   "http"              — a kengram tagger-sidecar (e.g. the deterministic
#                         GLiNER sidecar in crates/kengram-tagger-deterministic).
#
# Prompt A/B: add `system_prompt_file = "prompts/v17.txt"` plus a
# `model_version = 17` — the production provenance binding rejects a custom
# prompt without its own version number.
#
# Multi-arm Ollama sweeps: launch with OLLAMA_MAX_LOADED_MODELS=1 (and/or
# OLLAMA_KEEP_ALIVE=0) so each arm loads with the previous arm's model evicted.
# Otherwise arm N+1 is placed while arm N is still resident, Ollama underestimates
# free VRAM and strands layers on CPU (~2x slower), and never re-balances after
# arm N later evicts. Single-arm runs and non-Ollama backends are unaffected.

[[arm]]
name = "gemma3-12b"
provider = "openai-compatible"
endpoint = "http://localhost:11434/v1"
model_name = "gemma3:12b"

[[arm]]
name = "qwen3-coder-30b"
provider = "openai-compatible"
endpoint = "http://localhost:11434/v1"
model_name = "qwen3-coder:30b"

